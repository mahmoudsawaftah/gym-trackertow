<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>سجل الحديد — متابعة الجيم</title>
<meta name="theme-color" content="#161514">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600;700&family=Anton&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#15140f;
    --bg-alt:#1d1c16;
    --surface:#242219;
    --surface-2:#2b2920;
    --line: rgba(245,243,236,0.10);
    --chalk:#f5f2e8;
    --chalk-dim:#a9a598;
    --iron:#ff5a1f;
    --iron-dim: rgba(255,90,31,0.16);
    --plate:#d4c9a8;
    --done:#8bc24a;
    --done-dim: rgba(139,194,74,0.16);
    --danger:#e14b3a;
    --radius: 18px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{margin:0; padding:0; background:var(--bg); color:var(--chalk); font-family:'IBM Plex Sans Arabic', sans-serif; overscroll-behavior-y: none;}
  body{
    background-image:
      radial-gradient(circle at 15% 8%, rgba(255,90,31,0.06), transparent 40%),
      repeating-linear-gradient(135deg, rgba(255,255,255,0.012) 0px, rgba(255,255,255,0.012) 2px, transparent 2px, transparent 6px);
  }
  .num{font-family:'IBM Plex Mono', monospace;}
  .app{max-width:480px; margin:0 auto; min-height:100vh; padding-bottom: calc(96px + var(--safe-bottom)); position:relative;}

  /* HEADER */
  header.top{
    padding: calc(18px + var(--safe-top)) 20px 14px;
    position:sticky; top:0; z-index:20;
    background: linear-gradient(180deg, var(--bg) 78%, rgba(21,20,15,0));
    backdrop-filter: blur(6px);
  }
  .brand-row{display:flex; align-items:center; justify-content:space-between;}
  .brand{display:flex; align-items:center; gap:9px;}
  .brand .mark{
    width:30px; height:30px; border-radius:8px; background:var(--iron);
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
    box-shadow: 0 0 0 3px var(--iron-dim);
  }
  .brand .mark svg{width:16px; height:16px;}
  .brand h1{font-size:15px; margin:0; letter-spacing:0.02em; font-weight:700;}
  .brand h1 span{color:var(--chalk-dim); font-weight:500; font-size:11px; display:block; margin-top:1px;}
  .nav-toggle{
    display:flex; background:var(--surface); border-radius:100px; padding:3px; gap:2px; border:1px solid var(--line);
  }
  .nav-toggle button{
    border:none; background:transparent; color:var(--chalk-dim); font-family:inherit; font-size:12px; font-weight:600;
    padding:7px 13px; border-radius:100px; transition: all .2s;
  }
  .nav-toggle button.active{background:var(--iron); color:#1a0a04;}

  /* DAY TABS */
  .day-tabs{display:flex; gap:8px; overflow-x:auto; padding: 14px 20px 4px; scrollbar-width:none; -webkit-overflow-scrolling:touch;}
  .day-tabs::-webkit-scrollbar{display:none;}
  .day-tab{
    flex:0 0 auto; padding:9px 15px; border-radius:100px; border:1px solid var(--line); background:var(--surface);
    font-size:12.5px; font-weight:600; color:var(--chalk-dim); white-space:nowrap; position:relative;
  }
  .day-tab.active{background:var(--chalk); color:#1a1710; border-color:var(--chalk);}
  .day-tab .today-dot{position:absolute; top:-3px; left:-3px; width:8px; height:8px; border-radius:50%; background:var(--iron); box-shadow:0 0 0 2px var(--bg);}

  main{padding: 6px 20px 10px;}

  .day-heading{padding: 14px 2px 4px;}
  .day-heading .eyebrow{color:var(--iron); font-size:11px; font-weight:700; letter-spacing:0.14em; text-transform:uppercase;}
  .day-heading h2{margin:4px 0 2px; font-size:22px; font-weight:700;}
  .day-heading p{margin:0; color:var(--chalk-dim); font-size:13px;}

  .rest-day-card{
    margin-top:20px; padding:34px 20px; text-align:center; border-radius:var(--radius); background:var(--surface); border:1px dashed var(--line);
  }
  .rest-day-card .ico{font-size:30px; margin-bottom:10px;}
  .rest-day-card h3{margin:0 0 6px; font-size:17px;}
  .rest-day-card p{margin:0; color:var(--chalk-dim); font-size:13px; line-height:1.7;}

  /* TIP BANNER */
  .tip-banner{
    margin: 6px 0 16px; padding:13px 15px; border-radius:14px; background:var(--surface-2); border:1px solid var(--line);
    font-size:12px; color:var(--chalk-dim); line-height:1.8; display:flex; gap:10px; align-items:flex-start;
  }
  .tip-banner b{color:var(--chalk);}
  .tip-banner .ic{color:var(--iron); flex-shrink:0;}

  /* MUSCLE GROUP */
  .group{margin-bottom:22px;}
  .group-head{display:flex; align-items:center; gap:9px; margin:0 2px 10px;}
  .group-head .bar{width:4px; height:16px; border-radius:3px; background:var(--iron);}
  .group-head h3{font-size:14.5px; margin:0; font-weight:700;}
  .group-head .count{margin-inline-start:auto; font-size:11px; color:var(--chalk-dim);}

  /* EXERCISE CARD */
  .ex-card{
    background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:16px; margin-bottom:12px;
    position:relative; overflow:hidden;
  }
  .ex-card.complete{border-color: rgba(139,194,74,0.35);}
  .ex-top{display:flex; gap:13px; align-items:flex-start;}
  .plate-ring{position:relative; width:52px; height:52px; flex-shrink:0;}
  .plate-ring svg{width:52px; height:52px; transform:rotate(-90deg);}
  .plate-ring circle{fill:none; stroke-width:5;}
  .plate-ring .bg{stroke:var(--surface-2);}
  .plate-ring .fg{stroke:var(--iron); stroke-linecap:round; transition:stroke-dashoffset .3s ease;}
  .plate-ring.done .fg{stroke:var(--done);}
  .plate-ring .txt{position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700;}

  .ex-info{flex:1; min-width:0;}
  .ex-info h4{margin:0 0 3px; font-size:15.5px; font-weight:700; line-height:1.35;}
  .ex-meta{display:flex; gap:8px; flex-wrap:wrap; font-size:11.5px; color:var(--chalk-dim);}
  .ex-meta .num{color:var(--plate); font-weight:600;}

  .video-btn{
    margin-inline-start:auto; flex-shrink:0; width:38px; height:38px; border-radius:11px; border:1px solid var(--line);
    background:var(--surface-2); display:flex; align-items:center; justify-content:center;
  }
  .video-btn svg{width:15px; height:15px; fill:var(--chalk);}
  .video-wrap{margin-top:12px; border-radius:12px; overflow:hidden; background:#000; display:none;}
  .video-wrap.open{display:block;}
  .video-wrap iframe{width:100%; aspect-ratio:9/16; max-height:420px; display:block; border:0;}
  .video-ext{margin-top:12px; display:none; padding:10px 12px; border-radius:10px; background:var(--surface-2); font-size:12px; color:var(--chalk-dim); align-items:center; gap:8px;}
  .video-ext.open{display:flex;}
  .video-ext a{color:var(--iron); font-weight:700; text-decoration:none;}

  .sets-row{display:flex; gap:7px; margin-top:13px; flex-wrap:wrap;}
  .set-pill{
    flex:1; min-width:56px; height:52px; border-radius:12px; border:1px solid var(--line); background:var(--surface-2);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1px; position:relative;
  }
  .set-pill .lbl{font-size:9.5px; color:var(--chalk-dim); font-weight:600;}
  .set-pill .wt{font-size:12.5px; font-weight:700;}
  .set-pill.done{background:var(--done-dim); border-color:rgba(139,194,74,0.4);}
  .set-pill.done .wt{color:var(--done);}

  .ex-footer{display:flex; gap:8px; margin-top:12px;}
  .note-toggle{
    flex:1; border:1px solid var(--line); background:transparent; color:var(--chalk-dim); font-family:inherit;
    font-size:11.5px; padding:8px 10px; border-radius:9px; text-align:right;
  }
  .note-area{width:100%; margin-top:9px; display:none; background:var(--surface-2); border:1px solid var(--line); border-radius:10px;
    color:var(--chalk); font-family:inherit; font-size:12.5px; padding:9px 11px; resize:none;}
  .note-area.open{display:block;}

  /* REST TIMER (floating) */
  .rest-bar{
    position:fixed; left:14px; right:14px; bottom: calc(84px + var(--safe-bottom)); z-index:40;
    background:var(--chalk); color:#1a1710; border-radius:16px; padding:12px 16px; display:none;
    align-items:center; gap:12px; box-shadow: 0 10px 30px rgba(0,0,0,0.4); max-width:452px; margin:0 auto;
  }
  .rest-bar.show{display:flex;}
  .rest-bar .rtime{font-family:'IBM Plex Mono', monospace; font-size:22px; font-weight:700; min-width:56px;}
  .rest-bar .rlabel{font-size:11px; font-weight:600; flex:1; opacity:0.7;}
  .rest-bar button{border:none; background:rgba(0,0,0,0.08); color:#1a1710; font-family:inherit; font-weight:700; font-size:12px;
    padding:8px 11px; border-radius:9px;}
  .rest-bar .skip{background:#1a1710; color:var(--chalk);}

  /* WEIGHT SHEET */
  .sheet-overlay{position:fixed; inset:0; background:rgba(10,9,6,0.6); z-index:60; display:none; align-items:flex-end;}
  .sheet-overlay.show{display:flex;}
  .sheet{
    width:100%; max-width:480px; margin:0 auto; background:var(--bg-alt); border-radius:22px 22px 0 0; padding:20px 22px calc(26px + var(--safe-bottom));
    border-top:1px solid var(--line);
  }
  .sheet .handle{width:36px; height:4px; background:var(--line); border-radius:3px; margin:0 auto 16px;}
  .sheet h4{margin:0 0 3px; font-size:16px;}
  .sheet .sub{color:var(--chalk-dim); font-size:12px; margin-bottom:16px;}
  .sheet input{
    width:100%; background:var(--surface); border:1px solid var(--line); border-radius:12px; color:var(--chalk);
    font-family:'IBM Plex Mono', monospace; font-size:20px; font-weight:700; text-align:center; padding:14px; margin-bottom:12px;
  }
  .sheet .rep-row{display:flex; gap:10px; margin-bottom:16px;}
  .sheet .rep-row input{margin-bottom:0;}
  .sheet-btns{display:flex; gap:10px;}
  .sheet-btns button{flex:1; padding:14px; border-radius:12px; border:none; font-family:inherit; font-weight:700; font-size:14px;}
  .sheet-btns .cancel{background:var(--surface); color:var(--chalk-dim); border:1px solid var(--line);}
  .sheet-btns .confirm{background:var(--iron); color:#1a0a04;}

  /* BOTTOM NAV */
  .bottom-nav{
    position:fixed; bottom:0; left:0; right:0; z-index:30; background: rgba(21,20,15,0.92); backdrop-filter: blur(10px);
    border-top:1px solid var(--line); padding: 10px 20px calc(12px + var(--safe-bottom));
    display:flex; justify-content:center;
  }
  .bottom-nav-inner{max-width:480px; width:100%; display:flex; gap:8px;}
  .bn-btn{flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; background:transparent; border:none; color:var(--chalk-dim); font-family:inherit; padding:6px 0;}
  .bn-btn svg{width:20px; height:20px;}
  .bn-btn span{font-size:10.5px; font-weight:600;}
  .bn-btn.active{color:var(--iron);}

  /* PROGRESS PAGE */
  .progress-page{display:none;}
  .progress-page.show{display:block;}
  .day-tabs, .day-heading, main .today-content{display:block;}
  .hidden{display:none !important;}
  .stat-grid{display:grid; grid-template-columns:1fr 1fr 1fr; gap:9px; margin: 10px 2px 20px;}
  .stat-card{background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:13px 10px; text-align:center;}
  .stat-card .v{font-family:'IBM Plex Mono', monospace; font-size:19px; font-weight:700; color:var(--iron);}
  .stat-card .l{font-size:10px; color:var(--chalk-dim); margin-top:3px;}
  .chart-card{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:16px; margin: 0 2px 16px;}
  .chart-card h4{margin:0 0 3px; font-size:14px;}
  .chart-card .sub{font-size:11.5px; color:var(--chalk-dim); margin-bottom:14px;}
  select.ex-select{
    width:100%; background:var(--surface-2); color:var(--chalk); border:1px solid var(--line); border-radius:10px; padding:10px 12px;
    font-family:inherit; font-size:12.5px; margin-bottom:14px;
  }
  canvas{width:100%; display:block;}
  .empty-state{padding:30px 10px; text-align:center; color:var(--chalk-dim); font-size:13px; line-height:1.8;}
</style>
</head>
<body>
<div class="app">

  <header class="top">
    <div class="brand-row">
      <div class="brand">
        <div class="mark"><svg viewBox="0 0 24 24" fill="none" stroke="#1a0a04" stroke-width="2.5"><path d="M4 12h2M18 12h2M8 7v10M16 7v10M2 9v6M22 9v6M8 12h8"/></svg></div>
        <h1>سجل الحديد<span id="dateLabel"></span></h1>
      </div>
      <div class="nav-toggle">
        <button id="tabToday" class="active">اليوم</button>
        <button id="tabProgress">تقدّمي</button>
      </div>
    </div>
  </header>

  <div id="todayView" class="today-content">
    <div class="day-tabs" id="dayTabs"></div>
    <main>
      <div class="day-heading" id="dayHeading"></div>
      <div class="tip-banner">
        <span class="ic">◆</span>
        <span><b>ركّز وانت بتلعب:</b> تحكم بالحركة (Tempo) — نزول بطيء 2-3 ثواني — شد العضلة وليس بس رفع الوزن.</span>
      </div>
      <div id="dayBody"></div>
    </main>
  </div>

  <div id="progressView" class="progress-page">
    <main>
      <div class="day-heading">
        <span class="eyebrow">التقدّم</span>
        <h2>إحصائياتك</h2>
        <p>كل قراراتك بالحديد محفوظة على هاد الجهاز.</p>
      </div>
      <div class="stat-grid" id="statGrid"></div>
      <div class="chart-card">
        <h4>حجم التمرين آخر 8 جلسات</h4>
        <div class="sub">عدد السيتات المنجزة يوميًا</div>
        <canvas id="volumeChart" height="160"></canvas>
      </div>
      <div class="chart-card">
        <h4>تطور الوزن لتمرين معيّن</h4>
        <select class="ex-select" id="exerciseSelect"></select>
        <canvas id="weightChart" height="160"></canvas>
      </div>
    </main>
  </div>

</div>

<div class="rest-bar" id="restBar">
  <div class="rtime" id="restTime">01:30</div>
  <div class="rlabel">راحة قبل السيت الجاي</div>
  <button id="restMinus">−15</button>
  <button class="skip" id="restSkip">تخطي</button>
</div>

<div class="sheet-overlay" id="sheetOverlay">
  <div class="sheet">
    <div class="handle"></div>
    <h4 id="sheetTitle">سجّل السيت</h4>
    <div class="sub" id="sheetSub"></div>
    <div class="rep-row">
      <input type="number" inputmode="decimal" id="sheetWeight" placeholder="الوزن (كغ)">
      <input type="number" inputmode="numeric" id="sheetReps" placeholder="التكرارات">
    </div>
    <div class="sheet-btns">
      <button class="cancel" id="sheetCancel">إلغاء</button>
      <button class="confirm" id="sheetConfirm">تم ✓</button>
    </div>
  </div>
</div>

<nav class="bottom-nav">
  <div class="bottom-nav-inner">
    <button class="bn-btn active" id="navToday">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="17" rx="3"/><path d="M8 2v4M16 2v4M3 10h18"/></svg>
      <span>اليوم</span>
    </button>
    <button class="bn-btn" id="navProgress">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 20V10M12 20V4M20 20v-7"/></svg>
      <span>تقدّمي</span>
    </button>
  </div>
</nav>

<script>

const PLAN = {

      ]},
      {name:'صدر', items:[
        {n:'Pec Deck (Chest Fly)', sets:3, reps:'15', v:YT('b3EzlAHSM3E')},
      ]},
      {name:'ذراع', items:[
        {n:'Biceps Curl (Dumbbell / Cable)', sets:4, reps:'12', v:YT('CrbTqNOlFgE')},
        {n:'Cable Triceps Pushdown', sets:4, reps:'12', v:YT('1FjkhpZsaxc')},
      ]},
    ]
  },
  5: null // Friday — rest day
};

const DAY_NAMES = {0:'الأحد',1:'الاثنين',2:'الثلاثاء',3:'الأربعاء',4:'الخميس',5:'الجمعة',6:'السبت'};
const DAY_ORDER = [6,0,1,2,3,4,5]; // Sat -> Fri display order

/* ===================== STATE / STORAGE ===================== */
const LS_KEY = 'ironlog_v1';
function loadDB(){ try{ return JSON.parse(localStorage.getItem(LS_KEY)) || {}; }catch(e){ return {}; } }
function saveDB(db){ localStorage.setItem(LS_KEY, JSON.stringify(db)); }
let DB = loadDB(); // DB[dateStr][exId] = {sets:[{w,r,done}], note}

function todayStr(d = new Date()){
  return d.toISOString().slice(0,10);
}
function exId(dow, groupIdx, itemIdx){ return `${dow}_${groupIdx}_${itemIdx}`; }

let currentDow = new Date().getDay();
let selectedDow = currentDow;
let view = 'today';
let activeSheet = null;
let restTimer = null, restSeconds = 90;

/* ===================== RENDER: DAY TABS ===================== */
const dayTabsEl = document.getElementById('dayTabs');
function renderDayTabs(){
  dayTabsEl.innerHTML = '';
  DAY_ORDER.forEach(dow=>{
    const btn = document.createElement('button');
    btn.className = 'day-tab' + (dow===selectedDow ? ' active':'');
    const plan = PLAN[dow];
    btn.innerHTML = `${DAY_NAMES[dow]}${dow===currentDow?'<span class="today-dot"></span>':''}`;
    btn.onclick = ()=>{ selectedDow = dow; renderDayTabs(); renderDay(); };
    dayTabsEl.appendChild(btn);
  });
}

/* ===================== RENDER: DAY BODY ===================== */
const dayHeading = document.getElementById('dayHeading');
const dayBody = document.getElementById('dayBody');

function getExState(dateKey, id){
  DB[dateKey] = DB[dateKey] || {};
  DB[dateKey][id] = DB[dateKey][id] || {sets:[], note:''};
  return DB[dateKey][id];
}

function renderDay(){
  const plan = PLAN[selectedDow];
  const dateKey = selectedDow === currentDow ? todayStr() : todayStr(); // log always against today's date for simplicity when viewing today; historical browsing shows plan only
  dayHeading.innerHTML = `<span class="eyebrow">${selectedDow===currentDow?'اليوم':'خطة'} · ${DAY_NAMES[selectedDow]}</span>
    <h2>${plan ? plan.title : 'يوم راحة'}</h2>
    <p>${plan ? plan.sub : 'خلي عضلاتك تتعافى — نام كويس واشرب مي.'}</p>`;

  if(!plan){
    dayBody.innerHTML = `<div class="rest-day-card"><div class="ico">💤</div><h3>مافي تمرين اليوم</h3><p>يوم الجمعة يوم راحة كامل بالخطة.<br>استغلها بالمشي الخفيف والتمدد.</p></div>`;
    return;
  }

  dayBody.innerHTML = '';
  plan.groups.forEach((group, gi)=>{
    const gDiv = document.createElement('div');
    gDiv.className = 'group';
    gDiv.innerHTML = `<div class="group-head"><div class="bar"></div><h3>${group.name}</h3><div class="count">${group.items.length} تمارين</div></div>`;
    const list = document.createElement('div');
    group.items.forEach((item, ii)=>{
      const id = exId(selectedDow, gi, ii);
      const state = getExState(dateKey, id);
      list.appendChild(renderExerciseCard(item, id, state, dateKey));
    });
    gDiv.appendChild(list);
    dayBody.appendChild(gDiv);
  });
}

function renderExerciseCard(item, id, state, dateKey){
  const card = document.createElement('div');
  const doneCount = state.sets.filter(s=>s && s.done).length;
  const isComplete = doneCount >= item.sets && item.sets>0;
  card.className = 'ex-card' + (isComplete ? ' complete':'');

  const r = 21, circ = 2*Math.PI*r;
  const pct = Math.min(doneCount/item.sets, 1);
  const offset = circ - pct*circ;

  card.innerHTML = `
    <div class="ex-top">
      <div class="plate-ring ${isComplete?'done':''}">
        <svg viewBox="0 0 52 52">
          <circle class="bg" cx="26" cy="26" r="${r}"></circle>
          <circle class="fg" cx="26" cy="26" r="${r}" stroke-dasharray="${circ}" stroke-dashoffset="${offset}"></circle>
        </svg>
        <div class="txt">${doneCount}/${item.sets}</div>
      </div>
      <div class="ex-info">
        <h4>${item.n}</h4>
        <div class="ex-meta"><span class="num">${item.sets}×${item.reps}</span></div>
      </div>
      <button class="video-btn" data-role="video-toggle">
        <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </button>
    </div>
    ${item.v.type==='yt' ? `<div class="video-wrap"><iframe loading="lazy" src="" data-src="https://www.youtube.com/embed/${item.v.id}" allow="autoplay; encrypted-media" allowfullscreen></iframe></div>`
      : `<div class="video-ext">رابط هالفيديو مؤقت ومنتهي الصلاحية — <a href="https://www.youtube.com/results?search_query=${encodeURIComponent(item.n)}" target="_blank" rel="noopener">دور عليه بهاد الاسم على يوتيوب</a>.</div>`}
    <div class="sets-row" data-role="sets-row"></div>
    <div class="ex-footer">
      <button class="note-toggle" data-role="note-toggle">📝 ${state.note ? 'عرض/تعديل الملاحظة' : 'إضافة ملاحظة'}</button>
    </div>
    <textarea class="note-area" rows="2" placeholder="حسّيت وجع؟ بدك تزيد وزن الجاي؟ اكتب هون...">${state.note||''}</textarea>
  `;

  // sets row
  const setsRow = card.querySelector('[data-role="sets-row"]');
  for(let i=0;i<item.sets;i++){
    const s = state.sets[i];
    const pill = document.createElement('button');
    pill.className = 'set-pill' + (s && s.done ? ' done':'');
    pill.innerHTML = `<div class="lbl">سيت ${i+1}</div><div class="wt">${s && s.done ? (s.w||'—')+' كغ' : 'سجّل'}</div>`;
    pill.onclick = ()=> openSheet({item, id, setIndex:i, dateKey, existing:s});
    setsRow.appendChild(pill);
  }

  // video toggle
  const vBtn = card.querySelector('[data-role="video-toggle"]');
  vBtn.onclick = ()=>{
    if(item.v.type==='yt'){
      const wrap = card.querySelector('.video-wrap');
      const iframe = wrap.querySelector('iframe');
      wrap.classList.toggle('open');
      if(wrap.classList.contains('open') && !iframe.src){ iframe.src = iframe.dataset.src; }
    } else {
      card.querySelector('.video-ext').classList.toggle('open');
    }
  };

  // note toggle
  const noteBtn = card.querySelector('[data-role="note-toggle"]');
  const noteArea = card.querySelector('.note-area');
  noteBtn.onclick = ()=> noteArea.classList.toggle('open');
  noteArea.addEventListener('blur', ()=>{
    state.note = noteArea.value;
    saveDB(DB);
    noteBtn.textContent = '📝 ' + (state.note ? 'عرض/تعديل الملاحظة' : 'إضافة ملاحظة');
  });

  return card;
}

/* ===================== WEIGHT SHEET ===================== */
const sheetOverlay = document.getElementById('sheetOverlay');
const sheetTitle = document.getElementById('sheetTitle');
const sheetSub = document.getElementById('sheetSub');
const sheetWeight = document.getElementById('sheetWeight');
const sheetReps = document.getElementById('sheetReps');

function openSheet({item, id, setIndex, dateKey, existing}){
  activeSheet = {item, id, setIndex, dateKey};
  sheetTitle.textContent = item.n;
  sheetSub.textContent = `سيت ${setIndex+1} من ${item.sets} — الهدف: ${item.reps} تكرار`;
  sheetWeight.value = existing && existing.w != null ? existing.w : '';
  sheetReps.value = existing && existing.r != null ? existing.r : '';
  sheetOverlay.classList.add('show');
  setTimeout(()=> sheetWeight.focus(), 200);
}
function closeSheet(){ sheetOverlay.classList.remove('show'); activeSheet=null; }
document.getElementById('sheetCancel').onclick = closeSheet;
sheetOverlay.addEventListener('click', e=>{ if(e.target===sheetOverlay) closeSheet(); });

document.getElementById('sheetConfirm').onclick = ()=>{
  if(!activeSheet) return;
  const {item, id, setIndex, dateKey} = activeSheet;
  const state = getExState(dateKey, id);
  state.sets[setIndex] = { w: sheetWeight.value || '', r: sheetReps.value || '', done:true, t: Date.now() };
  saveDB(DB);
  closeSheet();
  renderDay();
  startRest();
};

/* ===================== REST TIMER ===================== */
const restBar = document.getElementById('restBar');
const restTimeEl = document.getElementById('restTime');
let restRemaining = 90;

function fmt(s){ const m = Math.floor(s/60); const sec = s%60; return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`; }

function startRest(){
  clearInterval(restTimer);
  restRemaining = 90;
  restTimeEl.textContent = fmt(restRemaining);
  restBar.classList.add('show');
  restTimer = setInterval(()=>{
    restRemaining--;
    if(restRemaining<=0){
      clearInterval(restTimer);
      restBar.classList.remove('show');
      beep();
      if(navigator.vibrate) navigator.vibrate([200,80,200]);
      return;
    }
    restTimeEl.textContent = fmt(restRemaining);
  },1000);
}
document.getElementById('restSkip').onclick = ()=>{ clearInterval(restTimer); restBar.classList.remove('show'); };
document.getElementById('restMinus').onclick = ()=>{ restRemaining = Math.max(0, restRemaining-15); restTimeEl.textContent = fmt(restRemaining); };

function beep(){
  try{
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const o = ctx.createOscillator(); const g = ctx.createGain();
    o.type='sine'; o.frequency.value=880; o.connect(g); g.connect(ctx.destination);
    g.gain.setValueAtTime(0.15, ctx.currentTime);
    o.start(); o.stop(ctx.currentTime+0.35);
  }catch(e){}
}

/* ===================== NAV SWITCH ===================== */
const todayView = document.getElementById('todayView');
const progressView = document.getElementById('progressView');
function setView(v){
  view = v;
  document.getElementById('tabToday').classList.toggle('active', v==='today');
  document.getElementById('tabProgress').classList.toggle('active', v!=='today');
  document.getElementById('navToday').classList.toggle('active', v==='today');
  document.getElementById('navProgress').classList.toggle('active', v!=='today');
  todayView.classList.toggle('hidden', v!=='today');
  progressView.classList.toggle('show', v==='progress');
  if(v==='progress') renderProgress();
}
document.getElementById('tabToday').onclick = ()=> setView('today');
document.getElementById('tabProgress').onclick = ()=> setView('progress');
document.getElementById('navToday').onclick = ()=> setView('today');
document.getElementById('navProgress').onclick = ()=> setView('progress');

/* ===================== PROGRESS PAGE ===================== */
function allSessions(){
  return Object.keys(DB).sort();
}
function renderProgress(){
  const dates = allSessions();
  const last8 = dates.slice(-8);

  // stats
  let totalSets = 0, totalSessions = dates.length, streak = 0;
  dates.forEach(d=>{
    Object.values(DB[d]).forEach(ex=> totalSets += ex.sets.filter(s=>s&&s.done).length);
  });
  // simple streak: consecutive days ending today with any logged set
  let cursor = new Date();
  while(true){
    const key = todayStr(cursor);
    const dayData = DB[key];
    const hasSets = dayData && Object.values(dayData).some(ex=>ex.sets.some(s=>s&&s.done));
    if(hasSets){ streak++; cursor.setDate(cursor.getDate()-1); } else break;
  }

  document.getElementById('statGrid').innerHTML = `
    <div class="stat-card"><div class="v num">${totalSessions}</div><div class="l">جلسات مسجّلة</div></div>
    <div class="stat-card"><div class="v num">${totalSets}</div><div class="l">إجمالي السيتات</div></div>
    <div class="stat-card"><div class="v num">${streak}</div><div class="l">أيام متتالية 🔥</div></div>
  `;

  // volume chart
  const volCanvas = document.getElementById('volumeChart');
  drawBarChart(volCanvas, last8.map(d=>{
    const day = DB[d];
    const count = Object.values(day).reduce((a,ex)=>a+ex.sets.filter(s=>s&&s.done).length,0);
    return {label: d.slice(5), value: count};
  }));

  // exercise select + weight chart
  const sel = document.getElementById('exerciseSelect');
  const uniqueExercises = new Map();
  dates.forEach(d=>{
    Object.keys(DB[d]).forEach(id=>{
      const [dow,gi,ii] = id.split('_').map(Number);
      const plan = PLAN[dow];
      if(plan && plan.groups[gi] && plan.groups[gi].items[ii]){
        uniqueExercises.set(id, plan.groups[gi].items[ii].n);
      }
    });
  });
  const prevSel = sel.value;
  sel.innerHTML = '';
  if(uniqueExercises.size===0){
    sel.innerHTML = '<option>لا يوجد بيانات بعد</option>';
    drawLineChart(document.getElementById('weightChart'), []);
  } else {
    uniqueExercises.forEach((name,id)=>{
      const opt = document.createElement('option');
      opt.value = id; opt.textContent = name;
      sel.appendChild(opt);
    });
    sel.value = [...uniqueExercises.keys()].includes(prevSel) ? prevSel : [...uniqueExercises.keys()][0];
    renderWeightChart(sel.value);
    sel.onchange = ()=> renderWeightChart(sel.value);
  }
}

function renderWeightChart(id){
  const dates = allSessions();
  const points = [];
  dates.forEach(d=>{
    const ex = DB[d][id];
    if(ex){
      const weights = ex.sets.filter(s=>s&&s.done&&s.w!=='').map(s=>parseFloat(s.w)||0);
      if(weights.length) points.push({label:d.slice(5), value: Math.max(...weights)});
    }
  });
  drawLineChart(document.getElementById('weightChart'), points.slice(-10));
}

function setupCanvas(canvas){
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  const w = rect.width || canvas.parentElement.clientWidth;
  const h = parseInt(canvas.getAttribute('height')) || 160;
  canvas.width = w*dpr; canvas.height = h*dpr;
  canvas.style.height = h+'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr,dpr);
  return {ctx, w, h};
}

function drawBarChart(canvas, data){
  const {ctx,w,h} = setupCanvas(canvas);
  ctx.clearRect(0,0,w,h);
  if(!data.length){ emptyChart(ctx,w,h,'مافي جلسات مسجّلة بعد'); return; }
  const max = Math.max(...data.map(d=>d.value), 1);
  const padBottom = 22, padTop = 10;
  const barW = w/data.length;
  data.forEach((d,i)=>{
    const bh = (d.value/max) * (h-padBottom-padTop);
    const x = i*barW + barW*0.22;
    const bw = barW*0.56;
    const y = h - padBottom - bh;
    ctx.fillStyle = i===data.length-1 ? '#ff5a1f' : '#8bc24a';
    roundRect(ctx, x, y, bw, bh, 5);
    ctx.fill();
    ctx.fillStyle = '#a9a598';
    ctx.font = '10px IBM Plex Mono';
    ctx.textAlign = 'center';
    ctx.fillText(d.label, x+bw/2, h-6);
    if(d.value>0){
      ctx.fillStyle = '#f5f2e8';
      ctx.fillText(d.value, x+bw/2, y-5);
    }
  });
}

function drawLineChart(canvas, data){
  const {ctx,w,h} = setupCanvas(canvas);
  ctx.clearRect(0,0,w,h);
  if(!data.length){ emptyChart(ctx,w,h,'ما في وزن مسجّل لهاد التمرين بعد'); return; }
  const max = Math.max(...data.map(d=>d.value),1);
  const min = Math.min(...data.map(d=>d.value),0);
  const padBottom = 22, padTop = 16, padX = 10;
  const range = (max-min)||1;
  const stepX = (w-padX*2)/Math.max(data.length-1,1);
  ctx.beginPath();
  data.forEach((d,i)=>{
    const x = padX + i*stepX;
    const y = padTop + (1-(d.value-min)/range)*(h-padBottom-padTop);
    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  });
  ctx.strokeStyle = '#ff5a1f'; ctx.lineWidth = 2.5; ctx.stroke();
  data.forEach((d,i)=>{
    const x = padX + i*stepX;
    const y = padTop + (1-(d.value-min)/range)*(h-padBottom-padTop);
    ctx.beginPath(); ctx.arc(x,y,3.5,0,7); ctx.fillStyle='#f5f2e8'; ctx.fill();
    ctx.fillStyle = '#a9a598'; ctx.font='9.5px IBM Plex Mono'; ctx.textAlign='center';
    ctx.fillText(d.label, x, h-6);
    ctx.fillStyle = '#ff5a1f'; ctx.font='10.5px IBM Plex Mono';
    ctx.fillText(d.value, x, y-9);
  });
}

function emptyChart(ctx,w,h,msg){
  ctx.fillStyle = '#5c584c'; ctx.font = '12px IBM Plex Sans Arabic'; ctx.textAlign='center';
  ctx.fillText(msg, w/2, h/2);
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

/* ===================== INIT ===================== */
function init(){
  const d = new Date();
  document.getElementById('dateLabel').textContent = d.toLocaleDateString('ar-JO', {weekday:'long', day:'numeric', month:'long'});
  renderDayTabs();
  renderDay();
}
init();
</script>
